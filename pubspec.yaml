name: kine_historial
description: KineHistorial wrapper
publish_to: 'none'
version: 3.0.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  path_provider: ^2.1.4
  archive: ^3.6.1
  file_picker: ^8.0.6
  open_filex: ^4.5.0
  flutter_file_dialog: ^3.0.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/webapp/index.html
    - assets/webapp/assets/css/styles.css
    - assets/webapp/assets/js/app.js
    - assets/webapp/assets/js/router.js
    - assets/webapp/assets/js/bridge.js
    - assets/webapp/assets/js/store.js
    - assets/webapp/assets/js/ui.js
    - assets/webapp/assets/js/views/home.js
    - assets/webapp/assets/js/views/patients.js
    - assets/webapp/assets/js/views/patient_detail.js
    - assets/webapp/assets/js/views/entry_new.js
    - assets/webapp/assets/js/views/entry_edit.js
    - assets/webapp/assets/js/views/professional.js
    - assets/webapp/assets/js/views/hc_generator.js
    - assets/